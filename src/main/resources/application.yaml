server:
  port: 1010
  servlet:
    context-path: /identity
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/identity_service
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
